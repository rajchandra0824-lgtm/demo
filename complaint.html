<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complaint Submit | PublicEye</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{
width:90%;
max-width:700px;
padding:40px;
border-radius:25px;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
display:grid;
gap:20px;
}

.container h2{
text-align:center;
color:#00f7ff;
}

form{
display:grid;
gap:15px;
}

.input-group{
display:flex;
flex-direction:column;
}

input, textarea{

padding:12px;
border:none;
border-radius:10px;
outline:none;

}

textarea{
resize:none;
height:120px;
}

.gps-box{

display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
background: rgba(0,0,0,0.3);
padding:10px;
border-radius:10px;

}

button{

padding:12px;
border:none;
border-radius:30px;
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;

}

#result{

text-align:center;
font-weight:bold;
color:#00ff99;

}

</style>

</head>

<body>

<div class="container">

<h2>Submit Your Complaint</h2>

<form action="submit.php"
method="POST"
enctype="multipart/form-data">

<div class="input-group">

<label>PIN Code</label>

<input type="number"
name="pin"
placeholder="Enter PIN"
required>

</div>


<div class="input-group">

<label>GPS Location</label>

<div class="gps-box">

<span id="location">
Not detected
</span>

<button type="button"
onclick="getLocation()">

Track GPS

</button>

</div>

</div>


<div class="input-group">

<label>Description</label>

<textarea
name="description"
placeholder="Write complaint"
required>

</textarea>

</div>


<div class="input-group">

<label>Upload Image</label>

<input type="file"
name="photo"
accept="image/*"
required>

</div>


<!-- Hidden GPS -->
<input type="hidden"
name="latitude"
id="lat">

<input type="hidden"
name="longitude"
id="lon">


<button type="submit">

Submit Complaint

</button>

</form>

<p id="result"></p>

</div>


<script>

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(position){

let lat=
position.coords.latitude;

let lon=
position.coords.longitude;

document.getElementById("location")
.innerText=

"Lat: "+lat+
" | Lon: "+lon;

document.getElementById("lat").value=lat;

document.getElementById("lon").value=lon;

},

function(){

alert("Location denied");

}

);

}

else{

alert("GPS not supported");

}

}

</script>

</body>
</html>
